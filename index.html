<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:16px;
    font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background:#f8f9fa;
    color:#111;
}

.wrapper{
    max-width:680px;
    margin:auto;
}

input,select,button{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:1px solid #e2e8f0;
    border-radius:12px;
    font-size:15px;
    background:#fff;
    transition: all 0.2s ease;
}

input:focus, select:focus{
    outline:none;
    border-color:#94a3b8;
    box-shadow:0 0 0 2px rgba(148,163,184,0.1);
}

button{
    background:#1e293b;
    color:#fff;
    border:none;
    font-weight:500;
    cursor:pointer;
    transition: all 0.2s;
}

button:hover{
    background:#0f172a;
}

button:disabled{
    opacity:0.5;
    cursor:not-allowed;
}

h3{
    margin:24px 0 16px;
    font-size:18px;
    font-weight:500;
    letter-spacing:-0.2px;
    color:#0f172a;
}

/* ========== КАРТОЧКА: заголовок слева / значение справа ========== */
.card{
    background:#ffffff;
    border:1px solid #edf2f7;
    border-radius:20px;
    padding:0;
    margin-bottom:12px;
    transition: all 0.15s;
    box-shadow:0 1px 2px rgba(0,0,0,0.02);
}

.info-table{
    width:100%;
    border-collapse: collapse;
}

.info-table tr{
    border-bottom:1px solid #f1f5f9;
}

.info-table tr:last-child{
    border-bottom:none;
}

.info-table td{
    padding:14px 16px;
    font-size:14px;
    vertical-align:top;
}

.info-table td:first-child{
    font-weight:500;
    color:#334155;
    width:38%;
    letter-spacing:-0.2px;
    background-color:#fdfdfd;
}

.info-table td:last-child{
    color:#0f172a;
    font-weight:470;
    text-align:right;
    word-break:break-word;
}

.status-open{
    color:#e67e22;
    font-weight:500;
    display:inline-block;
}

.status-closed{
    color:#10b981;
    font-weight:500;
}

/* ========== КНОПКИ ДЕЙСТВИЙ: слева и справа на телефоне ========== */
.actions{
    display:flex;
    gap:12px;
    padding:14px 16px 18px 16px;
    background:#ffffff;
    border-top:1px solid #f0f4f9;
    justify-content: space-between;
    align-items: center;
}

/* общий стиль для обеих кнопок - скругление 10px (не слишком большое) */
.action-btn {
    flex: 1;
    width: auto;
    padding: 12px 8px;
    font-size: 15px;
    font-weight: 500;
    border-radius: 10px;  /* уменьшенное скругление */
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
    border: none;
    min-width: 0;
}

/* кнопка ВЕРНУТЬ - синий цвет (как основной акцент) */
.close-btn {
    background: #2563eb;  /* насыщенный синий */
    color: white;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}

.close-btn:hover {
    background: #1d4ed8;  /* более тёмный синий при наведении */
}

/* кнопка УДАЛИТЬ - светлая, тоже скругление 10px */
.secondary-btn {
    background: #f1f5f9;
    color: #1e293b;
    border: 1px solid #e2e8f0;
    border-radius: 10px;  /* единое скругление */
}

.secondary-btn:hover {
    background: #e2e8f0;
}

/* Адаптация под маленькие экраны */
@media (max-width: 480px) {
    .actions {
        padding: 12px 14px 16px 14px;
        gap: 10px;
    }
    .action-btn {
        padding: 11px 6px;
        font-size: 14px;
        border-radius: 10px;  /* сохраняем единое скругление */
    }
    .info-table td {
        padding: 12px 12px;
    }
}

/* на десктопе чуть шире */
@media (min-width: 600px) {
    .actions {
        justify-content: space-between;
    }
    .action-btn {
        flex: 0 1 auto;
        min-width: 110px;
        padding: 10px 20px;
        border-radius: 10px;
    }
}

.loading{
    text-align:center;
    color:#6b7280;
    padding:40px 20px;
    background:#fff;
    border-radius:20px;
    border:1px solid #edf2f7;

.empty{

#user-info {

    background: #ffffff;
    padding: 12px 20px;

    margin-bottom: 24px;

.user-details {

#user-pic {

.user-text p {

#user-name {

#user-email {

#logout-btn {

<script>
// ============ КОНФИГУРАЦИЯ АВТОРИЗАЦИИ ============
const AUTH_SPREADSHEET_ID = '1-yiVdZYa6wJdupTiuiHvI_ht3Vu73RUjyCehZqs2cJ4';
const AUTH_SHEET_NAME = '1';
const AUTH_API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
const CURRENT_SITE = window.location.href.split('?')[0];

// ============ КОНФИГУРАЦИЯ УЧЁТА ДЕТАЛЕЙ ============
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwMyUTi-1BqBUF9VtzVW7wcvWjJOTtLSpbNFp6uuCqHq1z041FRiNcNzM8T137GdpM/exec';

let currentUser = null;
let currentUserNameFromSheet = null;

function showToast(message, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    toast.style.background = isError ? '#dc2626' : '#0f172a';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function callScriptAsync(functionName, data = null) {
    return new Promise((resolve, reject) => {
        const callbackName = 'callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        
        window[callbackName] = function(response) {
            delete window[callbackName];
            if (response && response.error) {
                reject(new Error(response.error));
            } else {
                resolve(response && response.result ? response.result : response);
            }
        };
        
        const params = new URLSearchParams();
        params.append('fn', functionName);
        if (data !== null) {
            params.append('data', JSON.stringify(data));
        }
        params.append('callback', callbackName);
        
        const script = document.createElement('script');
        script.src = `${SCRIPT_URL}?${params.toString()}`;
        script.onerror = () => {
            delete window[callbackName];
            reject(new Error('Network error'));
        };
        document.body.appendChild(script);
        
        setTimeout(() => {
            if (window[callbackName]) {
                delete window[callbackName];
                reject(new Error('Request timeout'));
            }
        }, 30000);
    });
}

async function loadAsync(){
    const container = document.getElementById('list');
    container.innerHTML = '<div class="loading"><div class="loading-spinner" style="width:30px;height:30px;"></div><br>Загрузка...</div>';
    
    try {
        const transfers = await callScriptAsync('getTransfers');
        if (Array.isArray(transfers)) {
            render(transfers);
        } else {
            throw new Error('Неверный формат данных');
        }
    } catch(error) {
        console.error('Load error:', error);
        container.innerHTML = '<div class="empty">Ошибка загрузки: ' + escapeHtml(error.message) + '</div>';
    }
}

async function moveAsync(){
    const partNumberInput = document.getElementById('partNumber');
    const quantityInput = document.getElementById('quantity');
    const moveBtn = document.getElementById('moveBtn');
    
    const partNumber = partNumberInput.value.trim();
    const quantityVal = quantityInput.value.trim();
    
    if(!partNumber){
        showToast('Введите номер детали', true);
        return;
    }
    
    if(!quantityVal || parseInt(quantityVal) <= 0){
        showToast('Введите корректное количество (больше 0)', true);
        return;
    }
    
    if(document.getElementById('from').value === document.getElementById('to').value){
        showToast('Нельзя перемещать деталь в тот же склад', true);
        return;
    }

    const fromSelect = document.getElementById('from');
    const toSelect = document.getElementById('to');
    
    const originalText = moveBtn.innerHTML;
    moveBtn.innerHTML = 'Перемещение...';
    moveBtn.disabled = true;

    try {
        await callScriptAsync('transferPart', {
            partNumber: partNumber,
            quantity: parseInt(quantityVal),
            from: fromSelect.value,
            to: toSelect.value,
            type: 'move'
        });
        
        partNumberInput.value = '';
        quantityInput.value = '1';
        
        await loadAsync();
        showToast('✅ Деталь успешно перемещена!');
    } catch(error) {
        showToast('❌ Ошибка: ' + error.message, true);
    } finally {
        moveBtn.innerHTML = originalText;
        moveBtn.disabled = false;
    }
}

async function closeTransferAsync(row, partNumber, from, to, maxQuantity){
    let returnQuantity = prompt(`Сколько деталей "${partNumber}" вернуть обратно в ${from}?\n(Доступно для возврата: ${maxQuantity})`, maxQuantity);
    
    if (returnQuantity === null) {
        return;
    }
    
    returnQuantity = parseInt(returnQuantity);
    
    if (isNaN(returnQuantity) || returnQuantity <= 0) {
        showToast('Введите корректное количество (больше 0)', true);
        return;
    }
    
    if (returnQuantity > maxQuantity) {
        showToast(`Нельзя вернуть больше ${maxQuantity} шт.`, true);
        return;
    }
    
    try {
        if (returnQuantity > 0) {
            await callScriptAsync('returnPart', {
                partNumber: partNumber,
                quantity: returnQuantity,
                to: to,
                from: from
            });
        }
        
        await callScriptAsync('closeTransfer', row);
        
        await loadAsync();
        showToast(`Возвращено ${returnQuantity} шт. в ${from}`);
    } catch(error) {
        showToast('Ошибка: ' + error.message, true);
    }
}

async function delRowAsync(row){
    if(confirm('Удалить запись навсегда?')){
        try {
            await callScriptAsync('deleteTransfer', row);
            await loadAsync();
            showToast('Запись удалена');
        } catch(error) {
            showToast('Ошибка: ' + error.message, true);
        }
    }
}

// Рендер с синей кнопкой "Вернуть" и уменьшенным скруглением
function render(transfers){
    const container = document.getElementById('list');
    
    if(!transfers || transfers.length === 0){
        container.innerHTML = '<div class="empty">📭 Нет перемещений</div>';
        return;
    }

    container.innerHTML = '';
    
    const sorted = [...transfers].sort((a,b) => {
        if(a.status === 'open' && b.status === 'closed') return -1;
        if(a.status === 'closed' && b.status === 'open') return 1;
        return new Date(b.timestamp) - new Date(a.timestamp);
    });
    
    sorted.forEach(transfer => {
        const div = document.createElement('div');
        div.className = 'card';

        let dateStr = 'Дата не указана';
        if (transfer.timestamp) {
            try {
                const date = new Date(transfer.timestamp);
                if (!isNaN(date.getTime())) {
                    dateStr = date.toLocaleString('ru-RU');
                }
            } catch(e) {
                dateStr = transfer.timestamp;
            }
        }
        
        let closedInfoStr = '';
        if(transfer.closedAt && transfer.closedAt !== ''){
            try {
                const closedDate = new Date(transfer.closedAt);
                if (!isNaN(closedDate.getTime())) {
                    closedInfoStr = closedDate.toLocaleString('ru-RU');
                }
            } catch(e) {
                closedInfoStr = transfer.closedAt;
            }
        }
        
        const statusClass = transfer.status === 'open' ? 'status-open' : 'status-closed';
        const statusText = transfer.status === 'open' ? '● Активно' : '✓ Закрыто';
        
        const table = document.createElement('table');
        table.className = 'info-table';
        
        const rowsData = [
            { label: 'Номер детали', value: transfer.partNumber || '—' },
            { label: 'Количество', value: `${transfer.quantity} шт.` },
            { label: 'Дата создания', value: dateStr },
            { label: 'Откуда', value: transfer.from || '—' },
            { label: 'Куда', value: transfer.to || '—' },
            { label: 'Статус', value: `<span class="${statusClass}">${statusText}</span>` }
        ];
        
        if (closedInfoStr) {
            rowsData.push({ label: 'Дата закрытия', value: closedInfoStr });
        }
        
        rowsData.forEach(rowItem => {
            const tr = document.createElement('tr');
            const tdLabel = document.createElement('td');
            tdLabel.textContent = rowItem.label;
            const tdValue = document.createElement('td');
            if (rowItem.label === 'Статус') {
                tdValue.innerHTML = rowItem.value;
            } else {
                tdValue.textContent = rowItem.value;
            }
            tr.appendChild(tdLabel);
            tr.appendChild(tdValue);
            table.appendChild(tr);
        });
        
        div.appendChild(table);
        
        // Блок действий с кнопками: Вернуть (синий, слева) и Удалить (светлый, справа)
        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'actions';
        
        if (transfer.status === 'open') {
            const returnBtn = document.createElement('button');
            returnBtn.textContent = 'Вернуть';
            returnBtn.className = 'action-btn close-btn';
            returnBtn.onclick = (e) => {
                e.stopPropagation();
                closeTransferAsync(
                    transfer.row,
                    transfer.partNumber || '',
                    transfer.from || '',
                    transfer.to || '',
                    transfer.quantity
                );
            };
            actionsDiv.appendChild(returnBtn);
        }
        
        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'Удалить';
        deleteBtn.className = 'action-btn secondary-btn';
        deleteBtn.onclick = (e) => {
            e.stopPropagation();
            delRowAsync(transfer.row);
        };
        
        // Если запись открыта (есть кнопка Вернуть), обе кнопки встанут по краям через justify-content: space-between
        // Если записи закрыты (нет кнопки Вернуть), то кнопку удаления прижимаем вправо
        if (transfer.status !== 'open') {
            deleteBtn.style.marginLeft = 'auto';
            deleteBtn.style.flex = '0 0 auto';
            actionsDiv.appendChild(deleteBtn);
        } else {
            actionsDiv.appendChild(deleteBtn);
        }
        
        div.appendChild(actionsDiv);
        container.appendChild(div);
    });
}

function escapeHtml(str){
    if (str === null || str === undefined) return '';
    if (typeof str !== 'string') str = String(str);
    return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

// ============ Функции авторизации ============

function loadSheetsAPI() {
    return new Promise((resolve, reject) => {
        gapi.load('client', {
            callback: () => resolve(),
            onerror: () => reject('Ошибка загрузки Google API'),
            timeout: 10000,
            ontimeout: () => reject('Таймаут загрузки Google API')
        });
    });
}

function handleCredentialResponse(response) {
    try {
        const payload = parseJwt(response.credential);
        
        currentUser = {
            email: payload.email.toLowerCase().trim(),
            name: payload.name,
            picture: payload.picture
        };
        
        showLoadingAuth(true);
        initAndCheckEmail();
        
    } catch (e) {
        console.error('Ошибка аутентификации:', e);
        showLoadingAuth(false);
        alert('Ошибка аутентификации');
    }
}

function showLoadingAuth(show) {
    const container = document.getElementById('login-container');
    if (show) {
        if (!container.hasAttribute('data-original')) {
            container.setAttribute('data-original', container.innerHTML);
        }
        container.innerHTML = '<div style="padding:40px;text-align:center;"><div class="loading-spinner"></div><br><span style="color:#64748b;">Проверка доступа...</span></div>';
    } else {
        if (container.getAttribute('data-original') && document.getElementById('login-section').style.display !== 'none') {
            container.innerHTML = container.getAttribute('data-original');
            if (window.google && google.accounts && google.accounts.id) {
                google.accounts.id.renderButton(document.querySelector('.g_id_signin'), {
                    type: 'standard',
                    shape: 'pill',
                    theme: 'outline',
                    text: 'signin_with',
                    size: 'large',
                    logo_alignment: 'left'
                });
            }
        }
    }
}

async function initAndCheckEmail() {
    try {
        await loadSheetsAPI();
        await gapi.client.init({
            apiKey: AUTH_API_KEY,
            discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
        });
        
        await checkEmailAndSiteInSheet(currentUser.email);
        
    } catch (error) {
        console.error('Ошибка инициализации:', error);
        showLoadingAuth(false);
        alert('Ошибка инициализации Google API');
    }
}

async function checkEmailAndSiteInSheet(email) {
    try {
        const response = await gapi.client.sheets.spreadsheets.values.get({
            spreadsheetId: AUTH_SPREADSHEET_ID,
            range: `${AUTH_SHEET_NAME}!A:Z`,
        });
        
        const rows = response.result.values;
        if (!rows || rows.length === 0) {
            showLoadingAuth(false);
            alert('Таблица пуста');
            return;
        }
        
        let hasAccess = false;
        let foundName = null;
        
        for (let i = 0; i < rows.length; i++) {
            if (!rows[i][0]) continue;
            
            const rowEmail = rows[i][0].toLowerCase().trim();
            if (rowEmail === email) {
                for (let j = 1; j < rows[i].length; j++) {
                    const site = rows[i][j]?.trim().split('?')[0];
                    if (site === CURRENT_SITE || site?.includes('TRANSFER')) {
                        hasAccess = true;
                        break;
                    }
                }
                if (rows[i][1]) {
                    foundName = rows[i][1].trim();
                }
                break;
            }
        }
        
        if (hasAccess) {
            currentUserNameFromSheet = foundName || currentUser.name;
            loginUser(currentUser);
        } else {
            showLoadingAuth(false);
            alert('Доступ запрещен: Ваш email не найден в таблице или у вас нет доступа к этому сайту');
        }
        
    } catch (error) {
        console.error('Ошибка доступа к таблице:', error);
        showLoadingAuth(false);
        alert('Ошибка доступа к таблице');
    }
}

function loginUser(payload) {
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('user-info').style.display = 'flex';
    document.getElementById('main-content').style.display = 'block';
    
    document.getElementById('user-pic').src = payload.picture;
    document.getElementById('user-name').textContent = currentUserNameFromSheet || payload.name;
    document.getElementById('user-email').textContent = payload.email;
    
    localStorage.setItem('userLoggedIn', 'true');
    localStorage.setItem('userEmail', payload.email.toLowerCase());
    localStorage.setItem('userName', payload.name);
    localStorage.setItem('userNameFromSheet', currentUserNameFromSheet || payload.name);
    localStorage.setItem('userPic', payload.picture);
    
    showLoadingAuth(false);
    
    loadAsync();
}

function parseJwt(token) {
    try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    } catch (e) {
        console.error('Ошибка парсинга JWT:', e);
        return {};
    }
}

function signOut() {
    localStorage.clear();
    sessionStorage.clear();
    
    if (google && google.accounts && google.accounts.id) {
        google.accounts.id.disableAutoSelect();
    }
    
    location.reload();
}

window.moveAsync = moveAsync;
window.closeTransferAsync = closeTransferAsync;
window.delRowAsync = delRowAsync;
window.signOut = signOut;
window.handleCredentialResponse = handleCredentialResponse;

window.addEventListener('load', function() {
    const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
    const email = localStorage.getItem('userEmail');
    const name = localStorage.getItem('userName');
    const nameSheet = localStorage.getItem('userNameFromSheet');
    const pic = localStorage.getItem('userPic');
    
    if (isLoggedIn && email) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('user-info').style.display = 'flex';
        document.getElementById('main-content').style.display = 'block';
        
        document.getElementById('user-name').textContent = nameSheet || name || 'User';
        document.getElementById('user-email').textContent = email;
        if (pic) document.getElementById('user-pic').src = pic;
        
        currentUser = {
            email: email,
            name: name,
            picture: pic
        };
        currentUserNameFromSheet = nameSheet || name;
        
        loadSheetsAPI()
            .then(() => gapi.client.init({
                apiKey: AUTH_API_KEY,
                discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
            }))
            .then(() => checkEmailAndSiteInSheet(email))
            .then(() => loadAsync())
            .catch(() => signOut());
    } else {
        document.getElementById('login-section').style.display = 'flex';
        document.getElementById('user-info').style.display = 'none';
        document.getElementById('main-content').style.display = 'none';
        
        if (google && google.accounts && google.accounts.id) {
            google.accounts.id.initialize({
                client_id: '328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com',
                callback: handleCredentialResponse
            });
            
            const signinDiv = document.querySelector('.g_id_signin');
            if (signinDiv) {
                google.accounts.id.renderButton(signinDiv, { 
                    type: 'standard', 
                    shape: 'pill', 
                    theme: 'outline', 
                    text: 'signin_with', 
                    size: 'large',
                    logo_alignment: 'left'
                });
            }
        }
    }
});
</script>
