<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Учёт деталей</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:16px;
    font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background:#fff;
    color:#111;
}

/* контейнер */
.wrapper{
    max-width:600px;
    margin:auto;
}

/* поля */
input,select,button{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

/* кнопка */
button{
    background:#1f2937;
    color:#fff;
    border:none;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#374151;
}

/* заголовок */
h3{
    margin:20px 0 10px;
    font-size:16px;
}

/* карточка */
.card{
    border:1px solid #eee;
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
    background:#fff;
}

/* текст */
.meta{
    font-size:14px;
    color:#444;
    margin:3px 0;
}

/* статусы */
.status-open{
    color:#f59e0b;
    font-weight:600;
}

.status-closed{
    color:#10b981;
    font-weight:600;
}

/* кнопки */
.actions{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.secondary{
    background:#f3f4f6;
    color:#111;
    border:none;
}

.secondary:hover{
    background:#e5e7eb;
}

/* индикатор загрузки */
.loading{
    text-align:center;
    color:#6b7280;
    padding:20px;
}

/* пустое состояние */
.empty{
    text-align:center;
    color:#9ca3af;
    padding:20px;
}
</style>
</head>

<body>

<div class="wrapper">

    <input id="part" placeholder="Деталь" autocomplete="off">

    <select id="from">
        <option>BLOCKBUSTER</option>
        <option>SKYMALL</option>
        <option>LUCKY STRIKE KH</option>
    </select>

    <select id="to">
        <option>BLOCKBUSTER</option>
        <option>SKYMALL</option>
        <option>LUCKY STRIKE KH</option>
    </select>

    <button onclick="add()">Добавить перемещение</button>

    <h3>Активные и закрытые</h3>
    <div id="list"></div>

</div>

<script>
// ВАШ URL ВЕБ-ПРИЛОЖЕНИЯ GOOGLE APPS SCRIPT
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyeWFpD7RiL0x8jXP08GTKCy5IfseVwzDnn1RJNJcInAOKHq89aUhK-04zlIzlAxR1K/exec';

// Функция для вызова Google Apps Script
function callScript(functionName, data = null) {
    return new Promise((resolve, reject) => {
        const callbackName = 'callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        
        window[callbackName] = function(response) {
            delete window[callbackName];
            if (document.body.contains(script)) {
                document.body.removeChild(script);
            }
            if (response && response.error) {
                reject(new Error(response.error));
            } else {
                resolve(response && response.result ? response.result : response);
            }
        };
        
        const params = new URLSearchParams();
        params.append('fn', functionName);
        if (data !== null) {
            params.append('data', JSON.stringify(data));
        }
        params.append('callback', callbackName);
        
        const script = document.createElement('script');
        script.src = `${SCRIPT_URL}?${params.toString()}`;
        script.onerror = () => {
            delete window[callbackName];
            reject(new Error('Network error'));
        };
        document.body.appendChild(script);
        
        setTimeout(() => {
            if (window[callbackName]) {
                delete window[callbackName];
                reject(new Error('Request timeout'));
            }
        }, 30000);
    });
}

async function load(){
    document.getElementById('list').innerHTML = '<div class="loading">Загрузка...</div>';
    
    try {
        const transfers = await callScript('getTransfers');
        if (Array.isArray(transfers)) {
            render(transfers);
        } else {
            throw new Error('Неверный формат данных');
        }
    } catch(error) {
        console.error('Load error:', error);
        document.getElementById('list').innerHTML = 
            '<div class="empty">❌ Ошибка загрузки: ' + escapeHtml(error.message) + '</div>';
    }
}

async function add(){
    const partInput = document.getElementById('part');
    const val = partInput.value.trim();
    
    if(!val){
        alert('Введите название детали');
        return;
    }

    const fromSelect = document.getElementById('from');
    const toSelect = document.getElementById('to');

    try {
        await callScript('addTransfer', {
            part: val,
            from: fromSelect.value,
            to: toSelect.value
        });
        partInput.value = '';
        load();
    } catch(error) {
        alert('Ошибка: ' + error.message);
    }
}

async function closeRow(row){
    if(confirm('Закрыть это перемещение?')){
        try {
            await callScript('closeTransfer', row);
            load();
        } catch(error) {
            alert('Ошибка: ' + error.message);
        }
    }
}

async function delRow(row){
    if(confirm('Удалить запись навсегда?')){
        try {
            await callScript('deleteTransfer', row);
            load();
        } catch(error) {
            alert('Ошибка: ' + error.message);
        }
    }
}

function render(transfers){
    const container = document.getElementById('list');
    
    if(!transfers || transfers.length === 0){
        container.innerHTML = '<div class="empty">📭 Нет перемещений</div>';
        return;
    }

    container.innerHTML = '';
    
    // Сортируем: сначала активные, потом закрытые
    const sorted = [...transfers].sort((a,b) => {
        if(a.status === 'open' && b.status === 'closed') return -1;
        if(a.status === 'closed' && b.status === 'open') return 1;
        return new Date(b.timestamp) - new Date(a.timestamp);
    });
    
    sorted.forEach(transfer => {
        const div = document.createElement('div');
        div.className = 'card';

        const statusClass = transfer.status === 'open' ? 'status-open' : 'status-closed';
        const statusText = transfer.status === 'open' ? '● Активно' : '✓ Закрыто';
        
        // Форматируем дату с проверкой
        let dateStr = 'Дата не указана';
        if (transfer.timestamp) {
            try {
                const date = new Date(transfer.timestamp);
                if (!isNaN(date.getTime())) {
                    dateStr = date.toLocaleString('ru-RU');
                }
            } catch(e) {
                dateStr = transfer.timestamp;
            }
        }
        
        let closedInfo = '';
        if(transfer.closedAt && transfer.closedAt !== ''){
            try {
                const closedDate = new Date(transfer.closedAt);
                if (!isNaN(closedDate.getTime())) {
                    closedInfo = `<div class="meta">📅 Закрыто: ${closedDate.toLocaleString('ru-RU')}</div>`;
                }
            } catch(e) {
                closedInfo = `<div class="meta">📅 Закрыто: ${transfer.closedAt}</div>`;
            }
        }

        div.innerHTML = `
            <b>${escapeHtml(transfer.part || 'Без названия')}</b>
            <div class="meta">📅 Создано: ${dateStr}</div>
            <div class="meta">📍 Из: ${escapeHtml(transfer.from || '—')}</div>
            <div class="meta">🎯 В: ${escapeHtml(transfer.to || '—')}</div>
            <div class="meta ${statusClass}">${statusText}</div>
            ${closedInfo}
            <div class="actions">
                ${transfer.status === 'open'
                    ? `<button onclick="closeRow(${transfer.row})">✓ Закрыть</button>`
                    : ''
                }
                <button class="secondary" onclick="delRow(${transfer.row})">🗑 Удалить</button>
            </div>
        `;

        container.appendChild(div);
    });
}

// Защита от XSS с проверкой типа
function escapeHtml(str){
    if (str === null || str === undefined) return '';
    if (typeof str !== 'string') str = String(str);
    return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

// Загружаем данные при открытии страницы
window.addEventListener('load', load);
</script>

</body>
</html>
