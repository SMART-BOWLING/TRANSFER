<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Учёт деталей</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js"></script>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:16px;
    font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background:#fff;
    color:#111;
}

/* контейнер */
.wrapper{
    max-width:600px;
    margin:auto;
}

/* поля */
input,select,button{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

/* кнопка */
button{
    background:#1f2937;
    color:#fff;
    border:none;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#374151;
}

/* заголовок */
h3{
    margin:20px 0 10px;
    font-size:16px;
}

/* карточка */
.card{
    border:1px solid #eee;
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
    background:#fff;
}

/* текст */
.meta{
    font-size:14px;
    color:#444;
    margin:3px 0;
}

/* статусы */
.status-open{
    color:#f59e0b;
    font-weight:600;
}

.status-closed{
    color:#10b981;
    font-weight:600;
}

/* кнопки */
.actions{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.secondary{
    background:#f3f4f6;
    color:#111;
    border:none;
}

.secondary:hover{
    background:#e5e7eb;
}

/* индикатор загрузки */
.loading{
    text-align:center;
    color:#6b7280;
    padding:20px;
}

/* пустое состояние */
.empty{
    text-align:center;
    color:#9ca3af;
    padding:20px;
}

/* Стили для авторизации */
#login {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 400px;
}

#user-info {
    display: none;
    align-items: center;
    justify-content: space-between;
    background: #f3f4f6;
    padding: 12px 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    gap: 15px;
    flex-wrap: wrap;
}

.user-details {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
}

#user-pic {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
}

.user-text p {
    margin: 0;
    font-size: 14px;
}

#user-name {
    font-weight: 600;
    color: #111;
}

#user-email {
    color: #6b7280;
    font-size: 12px;
}

#logout-btn {
    width: auto;
    background: #ef4444;
    padding: 8px 16px;
    margin: 0;
}

#logout-btn:hover {
    background: #dc2626;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="wrapper">
    <!-- Контейнер для авторизации -->
    <div id="login">
        <div id="g_id_onload" 
             data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" 
             data-callback="handleCredentialResponse" 
             data-auto_prompt="false"
             data-auto_select="false">
        </div>
        <div class="g_id_signin" 
             data-type="standard" 
             data-shape="pill" 
             data-theme="outline" 
             data-text="signin_with" 
             data-size="large" 
             data-logo_alignment="left">
        </div>
    </div>

    <!-- Информация о пользователе -->
    <div id="user-info">
        <div class="user-details">
            <img id="user-pic" src="" alt="Profile">
            <div class="user-text">
                <p id="user-name"></p>
                <p id="user-email"></p>
            </div>
        </div>
        <button id="logout-btn" onclick="signOut()">Выйти</button>
    </div>

    <!-- Основной контент (скрыт до авторизации) -->
    <div id="main-content" style="display: none;">
        <input id="part" placeholder="Деталь" autocomplete="off">
        <select id="from">
            <option>BLOCKBUSTER</option>
            <option>SKYMALL</option>
            <option>LUCKY STRIKE KH</option>
        </select>
        <select id="to">
            <option>BLOCKBUSTER</option>
            <option>SKYMALL</option>
            <option>LUCKY STRIKE KH</option>
        </select>
        <button onclick="add()">Добавить перемещение</button>
        <h3>Активные и закрытые</h3>
        <div id="list"></div>
    </div>
</div>

<script>
// Конфигурация Google Sheets для авторизации
const SPREADSHEET_ID = '1-yiVdZYa6wJdupTiuiHvI_ht3Vu73RUjyCehZqs2cJ4';
const SHEET_NAME = '1'; 
const API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';

// ВАШ URL ВЕБ-ПРИЛОЖЕНИЯ GOOGLE APPS SCRIPT
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyeWFpD7RiL0x8jXP08GTKCy5IfseVwzDnn1RJNJcInAOKHq89aUhK-04zlIzlAxR1K/exec';

let currentUser = null;

// Функция для вызова Google Apps Script
function callScript(functionName, data = null) {
    return new Promise((resolve, reject) => {
        const callbackName = 'callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        
        window[callbackName] = function(response) {
            delete window[callbackName];
            if (document.body.contains(script)) {
                document.body.removeChild(script);
            }
            if (response && response.error) {
                reject(new Error(response.error));
            } else {
                resolve(response && response.result ? response.result : response);
            }
        };
        
        const params = new URLSearchParams();
        params.append('fn', functionName);
        if (data !== null) {
            params.append('data', JSON.stringify(data));
        }
        params.append('callback', callbackName);
        
        const script = document.createElement('script');
        script.src = `${SCRIPT_URL}?${params.toString()}`;
        script.onerror = () => {
            delete window[callbackName];
            reject(new Error('Network error'));
        };
        document.body.appendChild(script);
        
        setTimeout(() => {
            if (window[callbackName]) {
                delete window[callbackName];
                reject(new Error('Request timeout'));
            }
        }, 30000);
    });
}

async function load(){
    document.getElementById('list').innerHTML = '<div class="loading">Загрузка...</div>';
    
    try {
        const transfers = await callScript('getTransfers');
        if (Array.isArray(transfers)) {
            render(transfers);
        } else {
            throw new Error('Неверный формат данных');
        }
    } catch(error) {
        console.error('Load error:', error);
        document.getElementById('list').innerHTML = 
            '<div class="empty">Ошибка загрузки: ' + escapeHtml(error.message) + '</div>';
    }
}

async function add(){
    const partInput = document.getElementById('part');
    const val = partInput.value.trim();
    
    if(!val){
        alert('Введите название детали');
        return;
    }

    const fromSelect = document.getElementById('from');
    const toSelect = document.getElementById('to');

    try {
        await callScript('addTransfer', {
            part: val,
            from: fromSelect.value,
            to: toSelect.value
        });
        partInput.value = '';
        load();
    } catch(error) {
        alert('Ошибка: ' + error.message);
    }
}

async function closeRow(row){
    if(confirm('Закрыть это перемещение?')){
        try {
            await callScript('closeTransfer', row);
            load();
        } catch(error) {
            alert('Ошибка: ' + error.message);
        }
    }
}

async function delRow(row){
    if(confirm('Удалить запись навсегда?')){
        try {
            await callScript('deleteTransfer', row);
            load();
        } catch(error) {
            alert('Ошибка: ' + error.message);
        }
    }
}

function render(transfers){
    const container = document.getElementById('list');
    
    if(!transfers || transfers.length === 0){
        container.innerHTML = '<div class="empty">Нет перемещений</div>';
        return;
    }

    container.innerHTML = '';
    
    // Сортируем: сначала активные, потом закрытые
    const sorted = [...transfers].sort((a,b) => {
        if(a.status === 'open' && b.status === 'closed') return -1;
        if(a.status === 'closed' && b.status === 'open') return 1;
        return new Date(b.timestamp) - new Date(a.timestamp);
    });
    
    sorted.forEach(transfer => {
        const div = document.createElement('div');
        div.className = 'card';

        const statusClass = transfer.status === 'open' ? 'status-open' : 'status-closed';
        const statusText = transfer.status === 'open' ? '● Активно' : '✓ Закрыто';
        
        // Форматируем дату с проверкой
        let dateStr = 'Дата не указана';
        if (transfer.timestamp) {
            try {
                const date = new Date(transfer.timestamp);
                if (!isNaN(date.getTime())) {
                    dateStr = date.toLocaleString('ru-RU');
                }
            } catch(e) {
                dateStr = transfer.timestamp;
            }
        }
        
        let closedInfo = '';
        if(transfer.closedAt && transfer.closedAt !== ''){
            try {
                const closedDate = new Date(transfer.closedAt);
                if (!isNaN(closedDate.getTime())) {
                    closedInfo = `<div class="meta">Закрыто: ${closedDate.toLocaleString('ru-RU')}</div>`;
                }
            } catch(e) {
                closedInfo = `<div class="meta">Закрыто: ${transfer.closedAt}</div>`;
            }
        }

        div.innerHTML = `
            <b>${escapeHtml(transfer.part || 'Без названия')}</b>
            <div class="meta">Создано: ${dateStr}</div>
            <div class="meta">Из: ${escapeHtml(transfer.from || '—')}</div>
            <div class="meta">В: ${escapeHtml(transfer.to || '—')}</div>
            <div class="meta ${statusClass}">${statusText}</div>
            ${closedInfo}
            <div class="actions">
                ${transfer.status === 'open'
                    ? `<button onclick="closeRow(${transfer.row})">Закрыть</button>`
                    : ''
                }
                <button class="secondary" onclick="delRow(${transfer.row})">Удалить</button>
            </div>
        `;

        container.appendChild(div);
    });
}

// Защита от XSS с проверкой типа
function escapeHtml(str){
    if (str === null || str === undefined) return '';
    if (typeof str !== 'string') str = String(str);
    return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

// ============ Функции авторизации ============

// Загрузка Google API
function loadSheetsAPI() {
    return new Promise((resolve, reject) => {
        gapi.load('client', {
            callback: () => resolve(),
            onerror: () => reject('Ошибка загрузки Google API'),
            timeout: 10000,
            ontimeout: () => reject('Таймаут загрузки Google API')
        });
    });
}

// Обработка ответа Google
function handleCredentialResponse(response) {
    try {
        const payload = parseJwt(response.credential);
        
        currentUser = {
            email: payload.email.toLowerCase().trim(),
            name: payload.name,
            picture: payload.picture
        };
        
        initAndCheckEmail();
        
    } catch (e) {
        console.error('Ошибка аутентификации:', e);
        alert('Ошибка аутентификации');
    }
}

// Инициализация API и проверка email
async function initAndCheckEmail() {
    try {
        await loadSheetsAPI();
        await gapi.client.init({
            apiKey: API_KEY,
            discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
        });
        
        await checkEmailInSheet(currentUser.email);
        
    } catch (error) {
        console.error('Ошибка инициализации:', error);
        alert('Ошибка инициализации Google API');
    }
}

// Проверка email в Google Sheets
async function checkEmailInSheet(email) {
    try {
        const response = await gapi.client.sheets.spreadsheets.values.get({
            spreadsheetId: SPREADSHEET_ID,
            range: `${SHEET_NAME}!A:Z`,
        });
        
        const rows = response.result.values;
        if (!rows || rows.length === 0) {
            alert('Таблица пуста');
            return;
        }
        
        // Поиск email в колонке A
        let foundRow = null;
        for (let i = 0; i < rows.length; i++) {
            if (!rows[i][0]) continue;
            
            const rowEmail = rows[i][0].toLowerCase().trim();
            if (rowEmail === email) {
                foundRow = rows[i];
                break;
            }
        }
        
        if (foundRow) {
            console.log('Пользователь найден:', foundRow);
            loginUser(currentUser);
        } else {
            alert('Доступ запрещен: Ваш email не найден в таблице');
        }
        
    } catch (error) {
        console.error('Ошибка доступа к таблице:', error);
        alert('Ошибка доступа к таблице');
    }
}

// Функция входа пользователя
function loginUser(payload) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('user-info').style.display = 'flex';
    document.getElementById('main-content').style.display = 'block';
    
    document.getElementById('user-pic').src = payload.picture;
    document.getElementById('user-name').textContent = payload.name;
    document.getElementById('user-email').textContent = payload.email;
    
    // Сохранение сессии
    localStorage.setItem('userLoggedIn', 'true');
    localStorage.setItem('userEmail', payload.email.toLowerCase());
    localStorage.setItem('userName', payload.name);
    localStorage.setItem('userPic', payload.picture);
    
    // Загружаем данные после авторизации
    load();
}

// Парсинг JWT токена
function parseJwt(token) {
    try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    } catch (e) {
        console.error('Ошибка парсинга JWT:', e);
        return {};
    }
}

// Выход из системы
function signOut() {
    localStorage.clear();
    sessionStorage.clear();
    
    // Выход из Google
    if (google && google.accounts && google.accounts.id) {
        google.accounts.id.disableAutoSelect();
    }
    
    location.reload();
}

// Проверка сессии при загрузке
window.addEventListener('load', function() {
    const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
    const email = localStorage.getItem('userEmail');
    const name = localStorage.getItem('userName');
    const pic = localStorage.getItem('userPic');
    
    if (isLoggedIn && email) {
        document.getElementById('login').style.display = 'none';
        document.getElementById('user-info').style.display = 'flex';
        document.getElementById('main-content').style.display = 'block';
        
        document.getElementById('user-name').textContent = name || 'User';
        document.getElementById('user-email').textContent = email;
        if (pic) document.getElementById('user-pic').src = pic;
        
        currentUser = {
            email: email,
            name: name,
            picture: pic
        };
        
        // Проверка актуальности сессии
        loadSheetsAPI()
            .then(() => gapi.client.init({
                apiKey: API_KEY,
                discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
            }))
            .then(() => checkEmailInSheet(email))
            .then(() => load())
            .catch(() => signOut());
    } else {
        // Инициализация Google Sign-In
        if (google && google.accounts && google.accounts.id) {
            google.accounts.id.initialize({
                client_id: '328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com',
                callback: handleCredentialResponse
            });
            
            google.accounts.id.renderButton(
                document.querySelector('.g_id_signin'),
                { 
                    type: 'standard', 
                    shape: 'pill', 
                    theme: 'outline', 
                    text: 'signin_with', 
                    size: 'large',
                    logo_alignment: 'left'
                }
            );
        }
    }
});
</script>

</body>
</html>
