<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Учёт деталей - TRANSFER</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js"></script>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:16px;
    font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background:#fff;
    color:#111;
}

.wrapper{
    max-width:600px;
    margin:auto;
}

input,select,button{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

button{
    background:#1f2937;
    color:#fff;
    border:none;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#374151;
}

.return-btn{
    background:#10b981;
}

.return-btn:hover{
    background:#059669;
}

h3{
    margin:20px 0 10px;
    font-size:16px;
}

.card{
    border:1px solid #eee;
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
    background:#fff;
}

.meta{
    font-size:14px;
    color:#444;
    margin:3px 0;
}

.status-open{
    color:#f59e0b;
    font-weight:600;
}

.status-closed{
    color:#10b981;
    font-weight:600;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:10px;
    flex-wrap:wrap;
}

.secondary{
    background:#f3f4f6;
    color:#111;
    border:none;
}

.secondary:hover{
    background:#e5e7eb;
}

.loading{
    text-align:center;
    color:#6b7280;
    padding:20px;
}

.empty{
    text-align:center;
    color:#9ca3af;
    padding:20px;
}

#login-section {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 400px;
}

#login-container {
    background: white;
    padding: 40px 30px;
    border-radius: 24px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
    max-width: 400px;
    width: 100%;
}

#login-container h2 {
    color: #1f2937;
    margin: 15px 0 5px;
    font-size: 24px;
}

.login-subtitle {
    color: #6b7280;
    font-size: 14px;
    margin-bottom: 25px;
}

.login-icon {
    width: 60px;
    height: 60px;
    background: #f3f4f6;
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
}

.login-icon i {
    font-size: 28px;
    color: #1f2937;
}

.loading-spinner {
    display: inline-block;
    width: 40px;
    height: 40px;
    border: 4px solid rgba(31,41,55,0.2);
    border-radius: 50%;
    border-top-color: #1f2937;
    animation: spin 1s ease-in-out infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

#user-info {
    display: none;
    align-items: center;
    justify-content: space-between;
    background: #f3f4f6;
    padding: 12px 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    gap: 15px;
    flex-wrap: wrap;
}

.user-details {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
}

#user-pic {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
}

.user-text p {
    margin: 0;
    font-size: 14px;
}

#user-name {
    font-weight: 600;
    color: #111;
}

#user-email {
    color: #6b7280;
    font-size: 12px;
}

#logout-btn {
    width: auto;
    background: #ef4444;
    padding: 8px 16px;
    margin: 0;
}

#logout-btn:hover {
    background: #dc2626;
}

#main-content {
    display: none;
}
</style>
</head>

<body>

<div class="wrapper">
    <div id="login-section">
        <div id="login-container">
            <div class="login-icon">
                <i class="fas fa-exchange-alt"></i>
            </div>
            <h2>TRANSFER</h2>
            <div class="login-subtitle">Учёт перемещения деталей</div>
            <div id="g_id_onload" 
                 data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" 
                 data-callback="handleCredentialResponse" 
                 data-auto_prompt="false"
                 data-auto_select="false">
            </div>
            <div class="g_id_signin" 
                 data-type="standard" 
                 data-shape="pill" 
                 data-theme="outline" 
                 data-text="signin_with" 
                 data-size="large" 
                 data-logo_alignment="left">
            </div>
        </div>
    </div>

    <div id="user-info">
        <div class="user-details">
            <img id="user-pic" src="" alt="Profile">
            <div class="user-text">
                <p id="user-name"></p>
                <p id="user-email"></p>
            </div>
        </div>
        <button id="logout-btn" onclick="signOut()">Выйти</button>
    </div>

    <div id="main-content">
        <input id="partNumber" placeholder="Номер детали" autocomplete="off">
        <input id="quantity" type="number" placeholder="Количество" min="1" value="1">
        <select id="from">
            <option>BB</option>
            <option>SKYMALL</option>
            <option>LUCKY STRIKE KH</option>
        </select>
        <select id="to">
            <option>BB</option>
            <option>SKYMALL</option>
            <option>LUCKY STRIKE KH</option>
        </select>
        <button onclick="move()">➡️ Переместить деталь</button>
        <button onclick="returnItem()" class="return-btn" style="background:#10b981;">⬅️ Вернуть деталь</button>
        <h3>История перемещений</h3>
        <div id="list"></div>
    </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script>
// ============ КОНФИГУРАЦИЯ АВТОРИЗАЦИИ ============
const AUTH_SPREADSHEET_ID = '1-yiVdZYa6wJdupTiuiHvI_ht3Vu73RUjyCehZqs2cJ4';
const AUTH_SHEET_NAME = '1';
const AUTH_API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
const CURRENT_SITE = 'https://smart-bowling.github.io/TRANSFER/';

// ============ КОНФИГУРАЦИЯ УЧЁТА ДЕТАЛЕЙ ============
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzEUaDWR0mzIoFeSYyTSHp9QdVyQljSgqYt2TDuKi1MihzmK1bWVUxgAVN6gWXuQz-x/exec';

let currentUser = null;
let currentUserNameFromSheet = null;

// ============ Функции авторизации ============

function loadSheetsAPI() {
    return new Promise((resolve, reject) => {
        gapi.load('client', {
            callback: () => resolve(),
            onerror: () => reject('Ошибка загрузки Google API'),
            timeout: 10000,
            ontimeout: () => reject('Таймаут загрузки Google API')
        });
    });
}

function handleCredentialResponse(response) {
    try {
        const payload = parseJwt(response.credential);
        
        currentUser = {
            email: payload.email.toLowerCase().trim(),
            name: payload.name,
            picture: payload.picture
        };
        
        showLoading(true);
        initAndCheckEmail();
        
    } catch (e) {
        console.error('Ошибка аутентификации:', e);
        showLoading(false);
        alert('Ошибка аутентификации');
    }
}

function showLoading(show) {
    const container = document.getElementById('login-container');
    if (show) {
        if (!container.hasAttribute('data-original')) {
            container.setAttribute('data-original', container.innerHTML);
        }
        container.innerHTML = '<div style="padding:40px;text-align:center;"><div class="loading-spinner"></div><br><span style="color:#64748b;">Проверка доступа...</span></div>';
    } else {
        if (container.getAttribute('data-original') && document.getElementById('login-section').style.display !== 'none') {
            container.innerHTML = container.getAttribute('data-original');
            if (window.google && google.accounts && google.accounts.id) {
                google.accounts.id.renderButton(document.querySelector('.g_id_signin'), {
                    type: 'standard',
                    shape: 'pill',
                    theme: 'outline',
                    text: 'signin_with',
                    size: 'large',
                    logo_alignment: 'left'
                });
            }
        }
    }
}

async function initAndCheckEmail() {
    try {
        await loadSheetsAPI();
        await gapi.client.init({
            apiKey: AUTH_API_KEY,
            discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
        });
        
        await checkEmailAndSiteInSheet(currentUser.email);
        
    } catch (error) {
        console.error('Ошибка инициализации:', error);
        showLoading(false);
        alert('Ошибка инициализации Google API');
    }
}

async function checkEmailAndSiteInSheet(email) {
    try {
        const response = await gapi.client.sheets.spreadsheets.values.get({
            spreadsheetId: AUTH_SPREADSHEET_ID,
            range: `${AUTH_SHEET_NAME}!A:Z`,
        });
        
        const rows = response.result.values;
        if (!rows || rows.length === 0) {
            showLoading(false);
            alert('Таблица пуста');
            return;
        }
        
        let hasAccess = false;
        let foundName = null;
        
        for (let i = 0; i < rows.length; i++) {
            if (!rows[i][0]) continue;
            
            const rowEmail = rows[i][0].toLowerCase().trim();
            if (rowEmail === email) {
                for (let j = 1; j < rows[i].length; j++) {
                    const site = rows[i][j]?.trim().split('?')[0];
                    if (site === CURRENT_SITE || site?.includes('TRANSFER')) {
                        hasAccess = true;
                        break;
                    }
                }
                if (rows[i][1]) {
                    foundName = rows[i][1].trim();
                }
                break;
            }
        }
        
        if (hasAccess) {
            currentUserNameFromSheet = foundName || currentUser.name;
            loginUser(currentUser);
        } else {
            showLoading(false);
            alert('Доступ запрещен: Ваш email не найден в таблице или у вас нет доступа к этому сайту');
        }
        
    } catch (error) {
        console.error('Ошибка доступа к таблице:', error);
        showLoading(false);
        alert('Ошибка доступа к таблице');
    }
}

function loginUser(payload) {
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('user-info').style.display = 'flex';
    document.getElementById('main-content').style.display = 'block';
    
    document.getElementById('user-pic').src = payload.picture;
    document.getElementById('user-name').textContent = currentUserNameFromSheet || payload.name;
    document.getElementById('user-email').textContent = payload.email;
    
    localStorage.setItem('userLoggedIn', 'true');
    localStorage.setItem('userEmail', payload.email.toLowerCase());
    localStorage.setItem('userName', payload.name);
    localStorage.setItem('userNameFromSheet', currentUserNameFromSheet || payload.name);
    localStorage.setItem('userPic', payload.picture);
    
    showLoading(false);
    
    load();
}

function parseJwt(token) {
    try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    } catch (e) {
        console.error('Ошибка парсинга JWT:', e);
        return {};
    }
}

function signOut() {
    localStorage.clear();
    sessionStorage.clear();
    
    if (google && google.accounts && google.accounts.id) {
        google.accounts.id.disableAutoSelect();
    }
    
    location.reload();
}

// ============ Функции учёта деталей ============

function callScript(functionName, data = null) {
    return new Promise((resolve, reject) => {
        const callbackName = 'callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        
        window[callbackName] = function(response) {
            delete window[callbackName];
            if (response && response.error) {
                reject(new Error(response.error));
            } else {
                resolve(response && response.result ? response.result : response);
            }
        };
        
        const params = new URLSearchParams();
        params.append('fn', functionName);
        if (data !== null) {
            params.append('data', JSON.stringify(data));
        }
        params.append('callback', callbackName);
        
        const script = document.createElement('script');
        script.src = `${SCRIPT_URL}?${params.toString()}`;
        script.onerror = () => {
            delete window[callbackName];
            reject(new Error('Network error'));
        };
        document.body.appendChild(script);
        
        setTimeout(() => {
            if (window[callbackName]) {
                delete window[callbackName];
                reject(new Error('Request timeout'));
            }
        }, 30000);
    });
}

async function load(){
    document.getElementById('list').innerHTML = '<div class="loading">Загрузка...</div>';
    
    try {
        const transfers = await callScript('getTransfers');
        if (Array.isArray(transfers)) {
            render(transfers);
        } else {
            throw new Error('Неверный формат данных');
        }
    } catch(error) {
        console.error('Load error:', error);
        document.getElementById('list').innerHTML = 
            '<div class="empty">Ошибка загрузки: ' + escapeHtml(error.message) + '</div>';
    }
}

async function move(){
    const partNumberInput = document.getElementById('partNumber');
    const quantityInput = document.getElementById('quantity');
    
    const partNumber = partNumberInput.value.trim();
    const quantityVal = quantityInput.value.trim();
    
    if(!partNumber){
        alert('Введите номер детали');
        return;
    }
    
    if(!quantityVal || parseInt(quantityVal) <= 0){
        alert('Введите корректное количество (больше 0)');
        return;
    }
    
    if(document.getElementById('from').value === document.getElementById('to').value){
        alert('Нельзя перемещать деталь в тот же склад');
        return;
    }

    const fromSelect = document.getElementById('from');
    const toSelect = document.getElementById('to');

    try {
        await callScript('transferPart', {
            partNumber: partNumber,
            quantity: parseInt(quantityVal),
            from: fromSelect.value,
            to: toSelect.value,
            type: 'move'
        });
        
        partNumberInput.value = '';
        quantityInput.value = '1';
        
        load();
        alert('Деталь успешно перемещена!');
    } catch(error) {
        alert('Ошибка: ' + error.message);
    }
}

async function returnItem(){
    const partNumberInput = document.getElementById('partNumber');
    const quantityInput = document.getElementById('quantity');
    
    const partNumber = partNumberInput.value.trim();
    const quantityVal = quantityInput.value.trim();
    
    if(!partNumber){
        alert('Введите номер детали');
        return;
    }
    
    if(!quantityVal || parseInt(quantityVal) <= 0){
        alert('Введите корректное количество (больше 0)');
        return;
    }
    
    if(document.getElementById('from').value === document.getElementById('to').value){
        alert('Нельзя возвращать деталь в тот же склад');
        return;
    }

    const fromSelect = document.getElementById('from');
    const toSelect = document.getElementById('to');

    try {
        await callScript('transferPart', {
            partNumber: partNumber,
            quantity: parseInt(quantityVal),
            from: fromSelect.value,
            to: toSelect.value,
            type: 'return'
        });
        
        partNumberInput.value = '';
        quantityInput.value = '1';
        
        load();
        alert('Деталь успешно возвращена!');
    } catch(error) {
        alert('Ошибка: ' + error.message);
    }
}

async function closeRow(row){
    if(confirm('Закрыть это перемещение?')){
        try {
            await callScript('closeTransfer', row);
            load();
        } catch(error) {
            alert('Ошибка: ' + error.message);
        }
    }
}

async function delRow(row){
    if(confirm('Удалить запись навсегда?')){
        try {
            await callScript('deleteTransfer', row);
            load();
        } catch(error) {
            alert('Ошибка: ' + error.message);
        }
    }
}

function render(transfers){
    const container = document.getElementById('list');
    
    if(!transfers || transfers.length === 0){
        container.innerHTML = '<div class="empty">Нет перемещений</div>';
        return;
    }

    container.innerHTML = '';
    
    const sorted = [...transfers].sort((a,b) => {
        if(a.status === 'open' && b.status === 'closed') return -1;
        if(a.status === 'closed' && b.status === 'open') return 1;
        return new Date(b.timestamp) - new Date(a.timestamp);
    });
    
    sorted.forEach(transfer => {
        const div = document.createElement('div');
        div.className = 'card';

        const statusClass = transfer.status === 'open' ? 'status-open' : 'status-closed';
        const statusText = transfer.status === 'open' ? '● Активно' : '✓ Закрыто';
        
        let dateStr = 'Дата не указана';
        if (transfer.timestamp) {
            try {
                const date = new Date(transfer.timestamp);
                if (!isNaN(date.getTime())) {
                    dateStr = date.toLocaleString('ru-RU');
                }
            } catch(e) {
                dateStr = transfer.timestamp;
            }
        }
        
        let closedInfo = '';
        if(transfer.closedAt && transfer.closedAt !== ''){
            try {
                const closedDate = new Date(transfer.closedAt);
                if (!isNaN(closedDate.getTime())) {
                    closedInfo = `<div class="meta">Закрыто: ${closedDate.toLocaleString('ru-RU')}</div>`;
                }
            } catch(e) {
                closedInfo = `<div class="meta">Закрыто: ${transfer.closedAt}</div>`;
            }
        }

        div.innerHTML = `
            <b>${escapeHtml(transfer.partNumber || 'Без номера')}</b>
            <div class="meta">Количество: <strong>${escapeHtml(transfer.quantity)}</strong> шт.</div>
            <div class="meta">Создано: ${dateStr}</div>
            <div class="meta">Из: ${escapeHtml(transfer.from || '—')}</div>
            <div class="meta">В: ${escapeHtml(transfer.to || '—')}</div>
            <div class="meta ${statusClass}">${statusText}</div>
            ${closedInfo}
            <div class="actions">
                ${transfer.status === 'open'
                    ? `<button onclick="closeRow(${transfer.row})">Закрыть</button>`
                    : ''
                }
                <button class="secondary" onclick="delRow(${transfer.row})">Удалить</button>
            </div>
        `;

        container.appendChild(div);
    });
}

function escapeHtml(str){
    if (str === null || str === undefined) return '';
    if (typeof str !== 'string') str = String(str);
    return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

// ============ Инициализация Google Sign-In и проверка сессии ============

window.addEventListener('load', function() {
    const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
    const email = localStorage.getItem('userEmail');
    const name = localStorage.getItem('userName');
    const nameSheet = localStorage.getItem('userNameFromSheet');
    const pic = localStorage.getItem('userPic');
    
    if (isLoggedIn && email) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('user-info').style.display = 'flex';
        document.getElementById('main-content').style.display = 'block';
        
        document.getElementById('user-name').textContent = nameSheet || name || 'User';
        document.getElementById('user-email').textContent = email;
        if (pic) document.getElementById('user-pic').src = pic;
        
        currentUser = {
            email: email,
            name: name,
            picture: pic
        };
        currentUserNameFromSheet = nameSheet || name;
        
        showLoading(true);
        loadSheetsAPI()
            .then(() => gapi.client.init({
                apiKey: AUTH_API_KEY,
                discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
            }))
            .then(() => checkEmailAndSiteInSheet(email))
            .then(() => load())
            .catch(() => signOut());
    } else {
        document.getElementById('login-section').style.display = 'flex';
        document.getElementById('user-info').style.display = 'none';
        document.getElementById('main-content').style.display = 'none';
        
        if (google && google.accounts && google.accounts.id) {
            google.accounts.id.initialize({
                client_id: '328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com',
                callback: handleCredentialResponse
            });
            
            google.accounts.id.renderButton(
                document.querySelector('.g_id_signin'),
                { 
                    type: 'standard', 
                    shape: 'pill', 
                    theme: 'outline', 
                    text: 'signin_with', 
                    size: 'large',
                    logo_alignment: 'left'
                }
            );
        }
    }
});

window.move = move;
window.returnItem = returnItem;
window.closeRow = closeRow;
window.delRow = delRow;
window.signOut = signOut;
</script>

</body>
</html>
